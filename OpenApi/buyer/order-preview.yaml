openapi: 3.0.0
info:
  title: Order Preview API
  version: 1.0.0
  description: Generate an order preview for the authenticated user's current cart.

paths:
  /buyer/order-preview:
    post:
      tags:
        - Order
      summary: Get order preview
      description: Returns items with pricing and totals from provided items, optionally applying vouchers.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: voucherOrderCode
          schema:
            type: string
          required: false
          description: Optional order voucher code (target=ORDER_DISCOUNT)
        - in: query
          name: voucherShippingCode
          schema:
            type: string
          required: false
          description: Optional shipping voucher code (target=SHIPPING_DISCOUNT)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, deliveryLocation, deliveryMethod]
              properties:
                items:
                  type: array
                  minItems: 1
                  description: List of items that the buyer wants to preview
                  items:
                    type: object
                    required: [product, quantity]
                    properties:
                      product:
                        type: string
                        description: Product id
                        example: "665b1e2f8c1a2b001e8e4a1b"
                      quantity:
                        type: integer
                        minimum: 1
                        description: Quantity to preview for this product
                        example: 2
                      variantCombinationId:
                        type: string
                        description: "Variant combination identifier (required when product has variants)."
                        example: "64c1a7f12a3c1f5d6e9a1001"
                deliveryLocation:
                  type: object
                  description: Delivery location object (e.g., coordinates)
                deliveryMethod:
                  type: string
                  description: "Delivery method enum (e.g., STANDARD, EXPRESS)"
                paymentMethod:
                  type: string
                  description: "Payment method (COD or ONLINE)"
      responses:
        '200':
          description: Order preview generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Order preview generated successfully
                  payload:
                    type: object
                    properties:
                      items:
                        type: array
                        description: Enriched line items after validation and pricing rules
                        items:
                          type: object
                          properties:
                            productId:
                              type: string
                            name:
                              type: string
                            price:
                              type: number
                            discountPrice:
                              type: number
                              nullable: true
                            finalUnitPrice:
                              type: number
                              description: Unit price after applying variant price (and discount if any)
                            quantity:
                              type: integer
                            itemTotal:
                              type: number
                            sellerId:
                              type: string
                            categories:
                              type: array
                              items:
                                type: string
                            images:
                              type: array
                              items:
                                type: string
                            variantCombinationId:
                              type: string
                              nullable: true
                            variantOptions:
                              type: array
                              nullable: true
                              items:
                                type: object
                                properties:
                                  groupName:
                                    type: string
                                  optionValue:
                                    type: string
                      summary:
                        type: object
                        properties:
                          subtotal:
                            type: number
                          discount:
                            type: number
                          shippingDiscount:
                            type: number
                          shippingFee:
                            type: number
                          total:
                            type: number
                      voucher:
                        type: object
                        properties:
                          order:
                            type: object
                            nullable: true
                            properties:
                              code:
                                type: string
                              type:
                                type: string
                                enum: [PERCENTAGE, FIXED]
                              discountValue:
                                type: number
                              maxDiscount:
                                type: number
                              minOrderValue:
                                type: number
                          shipping:
                            type: object
                            nullable: true
                            properties:
                              code:
                                type: string
                              type:
                                type: string
                                enum: [PERCENTAGE, FIXED]
                              discountValue:
                                type: number
                              maxDiscount:
                                type: number
                              minOrderValue:
                                type: number
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
              examples:
                missing_variant:
                  summary: Product with variants missing selection
                  value:
                    status: error
                    code: 400
                    message: Validation failed
                    errors:
                      - field: items
                        message: "Variant selection is required for product: 665b1e2f8c1a2b001e8e4a1b"
        '401':
          description: Unauthorized
        '404':
          description: Voucher not found


