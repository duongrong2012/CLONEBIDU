openapi: 3.0.0
info:
  title: Create Order API
  description: "Create an order from FE-provided items and optional vouchers"
  version: 1.0.0

paths:
  /buyer/orders:
    post:
      summary: Create order
      tags:
        - Order
      parameters:
        - in: query
          name: voucherOrderCode
          schema:
            type: string
          required: false
          description: "Voucher code for order discount (target = ORDER_DISCOUNT)"
        - in: query
          name: voucherShippingCode
          schema:
            type: string
          required: false
          description: "Voucher code for shipping discount (target = SHIPPING_DISCOUNT)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
                - deliveryLocation
                - deliveryMethod
                - paymentMethod
              properties:
                items:
                  type: array
                  minItems: 1
                  description: "List of items to order"
                  items:
                    type: object
                    required:
                      - product
                      - quantity
                    properties:
                      product:
                        type: string
                        description: "Product ID"
                        example: "665b1e2f8c1a2b001e8e4a1b"
                      quantity:
                        type: integer
                        minimum: 1
                        description: "Quantity to purchase"
                        example: 2
                      variantCombinationId:
                        type: string
                        description: "Variant combination identifier (required when product has variants)."
                        example: "64c1a7f12a3c1f5d6e9a1001"
                deliveryLocation:
                  type: object
                  description: "Delivery address/location payload"
                  example:
                    fullName: "John Doe"
                    phone: "+84 90 123 4567"
                    addressLine1: "12 Nguyen Trai"
                    wardCode: "00123"
                    districtCode: "0123"
                    provinceCode: "79"
                deliveryMethod:
                  type: string
                  description: "Delivery method"
                  example: "STANDARD"
                paymentMethod:
                  type: string
                  description: "Payment method"
                  enum: [COD, CREDIT_CARD, BANK_TRANSFER]
                  example: "COD"
            examples:
              valid:
                summary: "Valid create order request"
                value:
                  items:
                    - product: "665b1e2f8c1a2b001e8e4a1b"
                      quantity: 2
                      variantCombinationId: "64c1a7f12a3c1f5d6e9a1001"
                    - product: "665b1e2f8c1a2b001e8e4a1c"
                      quantity: 1
                      variantCombinationId: "64c1a7f12a3c1f5d6e9a1005"
                  deliveryLocation:
                    fullName: "John Doe"
                    phone: "+84 90 123 4567"
                    addressLine1: "12 Nguyen Trai"
                    wardCode: "00123"
                    districtCode: "0123"
                    provinceCode: "79"
                  deliveryMethod: "STANDARD"
                  paymentMethod: "COD"
      responses:
        '200':
          description: "Order created successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      user:
                        type: string
                      status:
                        type: string
                        example: PENDING
                      shippingAddress:
                        type: object
                      paymentMethod:
                        type: string
                      voucherCode:
                        type: array
                        items:
                          type: string
                      discountAmount:
                        type: number
                      shippingFee:
                        type: number
                      subtotal:
                        type: number
                      totalPrice:
                        type: number
                      orderDetails:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
              examples:
                success:
                  summary: "Order created"
                  value:
                    status: success
                    message: "Order created successfully"
                    data:
                      _id: "66a01d2b9e3f3d00233d1b01"
                      user: "665b1e2f8c1a2b001e8e4a1a"
                      status: "PENDING"
                      shippingAddress:
                        fullName: "John Doe"
                        phone: "+84 90 123 4567"
                        addressLine1: "12 Nguyen Trai"
                        wardCode: "00123"
                        districtCode: "0123"
                        provinceCode: "79"
                      paymentMethod: "COD"
                      voucherCode: ["SALE10"]
                      discountAmount: 20000
                      shippingFee: 30000
                      subtotal: 200000
                      totalPrice: 210000
                      orderDetails:
                        - "66a01d2b9e3f3d00233d1b02"
                        - "66a01d2b9e3f3d00233d1b03"
                      createdAt: "2024-07-02T03:04:05.000Z"
                      updatedAt: "2024-07-02T03:04:05.000Z"
        '400':
          description: "Bad request (validation or business error)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
              examples:
                duplicate_product:
                  summary: "Duplicate product in items"
                  value:
                    status: error
                    code: 400
                    message: Validation failed
                    errors:
                      - field: items
                        message: "Duplicate product in items: 665b1e2f8c1a2b001e8e4a1b"
                missing_variant:
                  summary: "Variant selection missing for a product that has variants"
                  value:
                    status: error
                    code: 400
                    message: Validation failed
                    errors:
                      - field: items
                        message: "Variant selection is required for product: 665b1e2f8c1a2b001e8e4a1b"
        '401':
          description: "Unauthorized"
        '403':
          description: "Forbidden"
        '404':
          description: "Not Found"
        '500':
          description: "Internal server error"
      security:
        - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

