openapi: 3.0.0
info:
  title: Update Voucher for Admin API
  version: 1.0.0
  description: |
    API for admins to update existing vouchers.
    
    ## Validation Rules:
    - Uses express-validator for input validation
    - All validation errors are returned in standardized format
    - Only admin-created vouchers (source: SYSTEM) can be updated
    - Cannot update voucher code
    - All fields are optional for update
    - Percentage discount cannot exceed 100%
    - Fixed discount cannot exceed 1,000,000,000
    - Quantity must be >= 1
    - Start date and end date must be valid ISO8601 format
    - Start date must be >= current date
    - End date must be after start date
    - All ObjectId references are validated for format and existence
    - Only admin can update status
    - Reject reason is required when status is REJECTED

paths:
  /admin/vouchers/{id}:
    patch:
      tags:
        - Voucher
      summary: Update a voucher (Admin only)
      description: |
        Update an existing voucher created by admin.
        
        **Business Rules:**
        - Only admin-created vouchers (source: SYSTEM) can be updated
        - Cannot update voucher code
        - Only admin can update status
        - Reject reason is required when status is REJECTED
        - All fields are optional for update
        
        **Access Control:**
        - Only ADMIN and SUPER_ADMIN roles can access this endpoint
        
        **Validation:**
        - All fields are validated using express-validator
        - ObjectId format validation before DB queries
        - Entity existence validation (sellers, users, products, categories)
        - Voucher existence and ownership validation
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Voucher ID to update
          schema:
            type: string
          example: "507f1f77bcf86cd799439015"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [PERCENTAGE, FIXED]
                  description: Type of discount
                  example: "PERCENTAGE"
                discountValue:
                  type: number
                  format: float
                  minimum: 0.01
                  description: |
                    Discount value based on type.
                    For PERCENTAGE: 0.01-100
                    For FIXED: 0.01-1,000,000,000
                  example: 15.5
                startDate:
                  type: string
                  format: date-time
                  description: Start date in ISO8601 format (must be >= current date)
                  example: "2024-06-01T00:00:00.000Z"
                endDate:
                  type: string
                  format: date-time
                  description: End date in ISO8601 format (must be after startDate)
                  example: "2024-08-31T23:59:59.999Z"
                quantity:
                  type: integer
                  minimum: 1
                  description: Number of vouchers available
                  example: 100
                description:
                  type: string
                  description: Optional description of the voucher
                  example: "Updated summer sale discount"
                minOrderValue:
                  type: number
                  format: float
                  minimum: 0
                  description: Minimum order value required to use voucher
                  example: 50000
                maxDiscount:
                  type: number
                  format: float
                  minimum: 0
                  description: Maximum discount amount that can be applied
                  example: 100000
                usageLimitPerUser:
                  type: integer
                  minimum: 1
                  description: Maximum times a user can use this voucher
                  example: 1
                applicableSellers:
                  type: array
                  items:
                    type: string
                  description: Array of seller IDs who can use this voucher
                  example: ["507f1f77bcf86cd799439011"]
                applicableUsers:
                  type: array
                  items:
                    type: string
                  description: Array of user IDs who can use this voucher
                  example: ["507f1f77bcf86cd799439012"]
                applicableProducts:
                  type: array
                  items:
                    type: string
                  description: Array of product IDs this voucher applies to
                  example: ["507f1f77bcf86cd799439013"]
                applicableCategories:
                  type: array
                  items:
                    type: string
                  description: Array of category IDs this voucher applies to
                  example: ["507f1f77bcf86cd799439014"]
                isActive:
                  type: boolean
                  description: "Whether the voucher is active"
                  example: true
                isPublic:
                  type: boolean
                  description: "Whether the voucher is publicly visible"
                  example: false
                status:
                  type: string
                  enum: [PENDING, APPROVED, REJECTED, EXPIRED]
                  description: Voucher status (only admin can update)
                  example: "APPROVED"
                rejectReason:
                  type: string
                  description: Reason for rejection (required when status is REJECTED)
                  example: "Invalid voucher terms"
            examples:
              updateBasicInfo:
                summary: Update basic voucher information
                value:
                  description: "Updated summer sale discount for all products"
                  quantity: 150
                  minOrderValue: 75000
                  maxDiscount: 150000
              updateStatus:
                summary: Update voucher status
                value:
                  status: "APPROVED"
              rejectVoucher:
                summary: Reject voucher with reason
                value:
                  status: "REJECTED"
                  rejectReason: "Voucher terms violate platform policies"
              updateAllFields:
                summary: Update all possible fields at once
                value:
                  type: "FIXED"
                  discountValue: 50000
                  startDate: "2024-06-01T00:00:00.000Z"
                  endDate: "2024-08-31T23:59:59.999Z"
                  quantity: 200
                  description: "Comprehensive summer sale voucher with fixed discount"
                  minOrderValue: 100000
                  maxDiscount: 100000
                  usageLimitPerUser: 2
                  applicableSellers: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
                  applicableUsers: ["507f1f77bcf86cd799439013", "507f1f77bcf86cd799439014"]
                  applicableProducts: ["507f1f77bcf86cd799439015", "507f1f77bcf86cd799439016"]
                  applicableCategories: ["507f1f77bcf86cd799439017", "507f1f77bcf86cd799439018"]
                  isActive: true
                  isPublic: false
                  status: "APPROVED"
      responses:
        '200':
          description: Voucher updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Voucher updated successfully"
                  data:
                    $ref: '#/components/schemas/Voucher'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: "Validation failed"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: "discountValue"
                        message:
                          type: string
                          example: "Percentage discount cannot exceed 100%."
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  code:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: "Unauthorized"
        '403':
          description: Forbidden - Insufficient permissions or not admin-created voucher
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  code:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: "Only admin-created vouchers can be updated"
        '404':
          description: Voucher not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  code:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: "Voucher not found"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  code:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: "Internal server error"

components:
  schemas:
    Voucher:
      type: object
      properties:
        _id:
          type: string
          description: Voucher ID
          example: "507f1f77bcf86cd799439015"
        code:
          type: string
          description: Voucher code (uppercase)
          example: "SUMMER2024"
        description:
          type: string
          description: Voucher description
          example: "Updated summer sale discount for all products"
        type:
          type: string
          enum: [PERCENTAGE, FIXED]
          description: Type of discount
          example: "PERCENTAGE"
        discountValue:
          type: number
          format: float
          description: Discount value
          example: 15.5
        maxDiscount:
          type: number
          format: float
          description: Maximum discount amount
          example: 150000
        startDate:
          type: string
          format: date-time
          description: Start date
          example: "2024-06-01T00:00:00.000Z"
        endDate:
          type: string
          format: date-time
          description: End date
          example: "2024-08-31T23:59:59.999Z"
        quantity:
          type: integer
          description: Total quantity available
          example: 150
        currentUsage:
          type: integer
          description: Number of vouchers used
          example: 0
        minOrderValue:
          type: number
          format: float
          description: Minimum order value required
          example: 75000
        usageLimitPerUser:
          type: integer
          description: Usage limit per user
          example: 1
        applicableSellers:
          type: array
          items:
            type: string
          description: Array of seller IDs
          example: ["507f1f77bcf86cd799439011"]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, EXPIRED]
          description: Voucher status
          example: "APPROVED"
        source:
          type: string
          enum: [SYSTEM, SHOP]
          description: Voucher source (always SYSTEM for admin-created)
          example: "SYSTEM"
        applicableUsers:
          type: array
          items:
            type: string
          description: Array of user IDs
          example: ["507f1f77bcf86cd799439012"]
        applicableProducts:
          type: array
          items:
            type: string
          description: Array of product IDs
          example: ["507f1f77bcf86cd799439013"]
        applicableCategories:
          type: array
          items:
            type: string
          description: Array of category IDs
          example: ["507f1f77bcf86cd799439014"]
        isActive:
          type: boolean
          description: Whether voucher is active
          example: true
        isPublic:
          type: boolean
          description: Whether voucher is publicly visible
          example: false
        rejectReason:
          type: string
          description: Reason for rejection (if status is REJECTED)
          example: "Invalid voucher terms"
        createdBy:
          type: string
          description: ID of user who created the voucher
          example: "507f1f77bcf86cd799439016"
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-15T10:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2024-01-15T11:45:00.000Z"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT 