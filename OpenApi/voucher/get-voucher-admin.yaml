openapi: 3.0.0
info:
  title: Get Vouchers (Admin)
  description: API for admin to get list of vouchers with filter and pagination
  version: 1.0.0

paths:
  /admin/vouchers:
    get:
      tags:
        - Voucher (Admin)
      summary: Get vouchers for admin (with filter, pagination)
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: code
          schema:
            type: string
          description: Filter by voucher code (partial, case-insensitive)
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
          description: Filter by voucher status
        - in: query
          name: type
          schema:
            type: string
            enum: [PERCENTAGE, FIXED]
          description: Filter by voucher type
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          description: Filter vouchers with startDate >= this value
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
          description: Filter vouchers with endDate <= this value
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (default 1)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Items per page (default 10, max 100)
        - in: query
          name: createdBy
          schema:
            type: string
          description: Filter by creator (seller/admin userId)
        - in: query
          name: isActive
          schema:
            type: boolean
          description: Filter by active status
        - in: query
          name: isPublic
          schema:
            type: boolean
          description: Filter by public status
        - in: query
          name: minOrderValue
          schema:
            type: number
          description: Filter vouchers with minOrderValue >= this value
        - in: query
          name: maxDiscount
          schema:
            type: number
          description: Filter by maximum discount value
        - in: query
          name: discountValue
          schema:
            type: number
          description: Filter by discount value
        - in: query
          name: quantity
          schema:
            type: integer
          description: Filter by voucher quantity
        - in: query
          name: source
          schema:
            type: string
            enum: [SYSTEM, SHOP]
          description: Filter by voucher source (SYSTEM for admin-created, SHOP for seller-created)
      responses:
        '200':
          description: List of vouchers (paginated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Vouchers retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Voucher'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 100
                      totalPages:
                        type: integer
                        example: 10
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Voucher:
      type: object
      properties:
        _id:
          type: string
          example: 64e8b7c2f1a2b3c4d5e6f7a8
        code:
          type: string
          example: SUMMER2024
        type:
          type: string
          example: PERCENTAGE
        discountValue:
          type: number
          example: 10
        maxDiscount:
          type: number
          example: 100000
        minOrderValue:
          type: number
          example: 50000
        applicableSellers:
          type: array
          items:
            type: string
        applicableUsers:
          type: array
          items:
            type: string
        applicableProducts:
          type: array
          items:
            type: string
        applicableCategories:
          type: array
          items:
            type: string
        startDate:
          type: string
          format: date-time
          example: 2024-06-01T00:00:00.000Z
        endDate:
          type: string
          format: date-time
          example: 2024-06-30T23:59:59.000Z
        quantity:
          type: integer
          example: 100
        currentUsage:
          type: integer
          example: 10
        usageLimitPerUser:
          type: integer
          example: 1
        description:
          type: string
          example: Summer sale 2024
        isActive:
          type: boolean
          example: true
        isPublic:
          type: boolean
          example: false
        status:
          type: string
          example: APPROVED
        rejectReason:
          type: string
          example: null
        source:
          type: string
          example: SYSTEM
        createdBy:
          type: string
          example: 64e8b7c2f1a2b3c4d5e6f7a1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: integer
          example: 400
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: code
              message:
                type: string
                example: Voucher code must be uppercase. 