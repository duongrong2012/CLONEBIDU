openapi: 3.0.0
info:
  title: Forgot Password API
  version: 1.0.0
  description: API for requesting password reset instructions

paths:
  /auth-buyer/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset instructions
      description: Generates password reset instructions for an account email. The response is generic to avoid email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '200':
          description: Password reset request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: If the email exists, password reset instructions have been generated
                  payload:
                    type: object
                    nullable: true
                    description: Present only outside production for local development and automated tests.
                    properties:
                      otp:
                        type: string
                        nullable: true
                        example: '123456'
                      otpExpires:
                        type: string
                        format: date-time
                        nullable: true
                      emailSent:
                        type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Validation failed
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: email
                        message:
                          type: string
                          example: Invalid email format
        '429':
          description: Password reset request is rate limited
          headers:
            Retry-After:
              description: Seconds until another request can be accepted for the email.
              schema:
                type: integer
                example: 30
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 429
                  message:
                    type: string
                    example: Please wait 30 seconds before requesting another password reset OTP
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: email
                        message:
                          type: string
                          example: Please wait 30 seconds before requesting another password reset OTP
        '500':
          description: Password reset email delivery is not configured or could not be sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Password reset email delivery is not configured
                  errors:
                    nullable: true
