openapi: 3.0.0
info:
  title: Bidu API Documentation
  version: 1.0.0
  description: API documentation for Bidu e-commerce platform

servers:
  - url: http://localhost:3000
    description: Development server

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          format: password
          description: User password
          example: Password123!


    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Login successful
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refreshToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            tokenType:
              type: string
              example: Bearer
            expiresIn:
              type: string
              example: 15m

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: integer
          example: 400
        message:
          type: string
          example: Validation error
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email format

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        code:
          type: integer
          example: 401
        message:
          type: string
          example: Error message

paths:
  /auth-buyer/login:
    post:
      summary: Login to user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              buyerAccount:
                summary: Buyer account login
                description: Example credentials for a buyer account.
                value:
                  email: user4@example.com
                  password: Password123!
              sellerAccount:
                summary: Seller account login
                description: Example credentials for a seller account.
                value:
                  email: user@example.com
                  password: Password123!
              adminUser:
                summary: Admin user login
                value:
                  email: superadmin@bidu.com
                  password: Superadmin123@
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missingFields:
                  value:
                    status: error
                    code: 400
                    message: Validation failed
                    errors:
                      - field: email
                        message: Email is required
                      - field: password
                        message: Password is required
                invalidFormat:
                  value:
                    status: error
                    code: 400
                    message: Validation failed
                    errors:
                      - field: email
                        message: Invalid email format
                passwordLength:
                  value:
                    status: error
                    code: 400
                    message: Validation failed
                    errors:
                      - field: password
                        message: Password must be at least 6 characters long
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    status: error
                    code: 401
                    message: Invalid email or password
                accountDeactivated:
                  value:
                    status: error
                    code: 401
                    message: Your account has been deactivated
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
