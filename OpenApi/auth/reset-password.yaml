openapi: 3.0.0
info:
  title: Reset Password API
  version: 1.0.0
  description: API for resetting user password with an OTP

paths:
  /auth-buyer/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Resets an account password using a valid 6-digit password reset OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
                - newPassword
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                otp:
                  type: string
                  pattern: '^\\d{6}$'
                  example: '123456'
                newPassword:
                  type: string
                  example: NewPassword123
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Password reset successfully
                  payload:
                    nullable: true
        '400':
          description: Validation error, expired OTP, invalid OTP, or duplicated password
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Password reset OTP is invalid or has expired
                  errors:
                    nullable: true
        '403':
          description: Account inactive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  code:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Your account has been inactive
                  errors:
                    nullable: true
