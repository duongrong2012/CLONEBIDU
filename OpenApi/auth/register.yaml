openapi: 3.0.0
info:
  title: Bidu API Documentation
  version: 1.0.0
  description: API documentation for Bidu e-commerce platform

servers:
  - url: http://localhost:3000
    description: Development server

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - gender
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 6
          description: User password (minimum 6 characters, must contain at least one uppercase letter, one lowercase letter, one number, and one special character)
          example: Password123!
        firstName:
          type: string
          description: User first name
          example: John
        lastName:
          type: string
          description: User last name
          example: Doe
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
          description: User gender
          example: MALE

    RegisterResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Registration successful
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                  example: 123e4567-e89b-12d3-a456-426614174000
                email:
                  type: string
                  example: user@example.com
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Doe
                gender:
                  type: string
                  example: MALE
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Validation error
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Invalid email format

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Error message

paths:
  /auth-buyer/register:
    post:
      summary: Register a new user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missingFields:
                  value:
                    status: error
                    message: Validation error
                    errors:
                      - field: firstName
                        message: First name is required
                      - field: lastName
                        message: Last name is required
                      - field: gender
                        message: Gender is required
                invalidFormat:
                  value:
                    status: error
                    message: Validation error
                    errors:
                      - field: email
                        message: Invalid email format
                      - field: password
                        message: Password must be at least 6 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                message: Email already exists
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
