openapi: 3.0.0
info:
  title: Bidu API Documentation
  version: 1.0.0
  description: API documentation for Bidu e-commerce platform
servers:
  - url: http://localhost:3000
    description: Development server
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /admin/categories:
    post:
      tags:
        - Category
      summary: Create a new category
      description: Create a new category with name and optional parentId
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Category name
                  example: "Điện Thoại Samsung"
                  minLength: 2
                  maxLength: 50
                parentId:
                  type: string
                  description: ID of parent category (optional)
                  example: "65f1a2b3c4d5e6f7g8h9i0j1"
                isActive:
                  type: boolean
                  description: Category status (optional)
                  example: true
                  default: true
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "65f1a2b3c4d5e6f7g8h9i0j1"
                      name:
                        type: string
                        example: "Điện Thoại Samsung"
                      slug:
                        type: string
                        example: "dien-thoai-samsung-a1b2c3d4"
                      parentId:
                        type: string
                        example: "65f1a2b3c4d5e6f7g8h9i0j1"
                        nullable: true
                      children:
                        type: array
                        items:
                          type: string
                        example: []
                      hasChildren:
                        type: boolean
                        example: false
                      isActive:
                        type: boolean
                        example: true
                      level:
                        type: number
                        example: 0
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Category name must be between 2 and 50 characters"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Please login to access this resource"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "You do not have permission to perform this action"
        '404':
          description: Parent category not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Parent category not found"