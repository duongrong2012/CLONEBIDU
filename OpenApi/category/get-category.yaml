paths:
  /buyer/categories:
    get:
      tags:
        - Category
      summary: Get categories 123
      description: |
        Get a paginated list of categories with filtering and sorting options.
        
        Features:
        - Pagination
        - Search by name
        - Filter by parent, level, and status
        - Sort by various fields
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - name: search
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 50
          description: Search term for category name
        - name: parentId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter by parent category ID (null for root categories)
        - name: level
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 2
          description: Filter by category level (0=root, 1=child, 2=grandchild)
        - name: isActive
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, level, createdAt, updatedAt]
            default: createdAt
          description: Field to sort by
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Categories retrieved successfully"
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                              example: "65f1a2b3c4d5e6f7g8h9i0j1"
                            name:
                              type: string
                              example: "Smartphones"
                            slug:
                              type: string
                              example: "smartphones-a1b2c3d4"
                            parentId:
                              type: string
                              nullable: true
                              example: "65f1a2b3c4d5e6f7g8h9i0j1"
                            level:
                              type: integer
                              example: 1
                            children:
                              type: array
                              items:
                                type: string
                              example: []
                            hasChildren:
                              type: boolean
                              example: false
                            isActive:
                              type: boolean
                              example: true
                            createdAt:
                              type: string
                              format: date-time
                              example: "2024-03-15T08:00:00.000Z"
                            updatedAt:
                              type: string
                              format: date-time
                              example: "2024-03-15T08:00:00.000Z"
                      total:
                        type: integer
                        example: 100
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      totalPages:
                        type: integer
                        example: 10
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Invalid query parameters" 