openapi: 3.0.0
info:
  title: Update Product API
  description: Update an existing product with comprehensive validation and permission checks.
  version: 1.0.0

paths:
  /admin/products/{id}:
    patch:
      tags:
        - Product
      summary: Update a product
      description: |
        Update an existing product. 
        - **Admin/Super Admin**: Can update all fields including status and rejectedReason
        - **Seller**: Can only update their own products, status will automatically change to PENDING
        - **Buyer**: Cannot update products
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
            example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: Product name
                  example: "Updated Product Name"
                description:
                  type: string
                  description: Product description
                  example: "Updated product description"
                price:
                  type: number
                  minimum: 0
                  description: Product price
                  example: 99.99
                discountPrice:
                  type: number
                  minimum: 0
                  description: Discount price (must be <= price)
                  example: 79.99
                categories:
                  oneOf:
                    - type: array
                      items:
                        type: string
                        pattern: '^[0-9a-fA-F]{24}$'
                    - type: string
                      pattern: '^[0-9a-fA-F]{24}$'
                  description: Category IDs (array or single ID)
                  example: ["507f1f77bcf86cd799439011", "507f1f77bcf86cd799439012"]
                isActive:
                  type: boolean
                  description: Product active status
                  example: true
                isFeatured:
                  type: boolean
                  description: Product featured status
                  example: false
                status:
                  type: string
                  enum: [PENDING, APPROVED, REJECTED]
                  description: Product status (Admin only)
                  example: "APPROVED"
                rejectedReason:
                  type: string
                  minLength: 1
                  maxLength: 500
                  description: Reason for rejection (Admin only, required when status is REJECTED)
                  example: "Product description violates community guidelines"
                # metadata removed
                quantity:
                  type: number
                  minimum: 0
                  description: Available quantity
                  example: 50
                variantGroups:
                  type: array
                  description: Variant groups definition (optional; required if variantCombinations provided)
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      options:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: string
                            # priceDelta removed
                variantCombinations:
                  type: array
                  description: Valid combinations; sum of quantities must equal product quantity
                  items:
                    type: object
                    properties:
                      _id:
                        type: string
                      options:
                        type: array
                        items:
                          type: object
                          properties:
                            groupName:
                              type: string
                            optionValue:
                              type: string
                      quantity:
                        type: number
                        minimum: 0
                      price:
                        type: number
                        minimum: 0
                      discountPrice:
                        type: number
                        minimum: 0
                      image:
                        type: string
                        description: Image URL representing this variant combination
                      sku:
                        type: string
                        description: Optional seller SKU (uppercased on save, must be unique per seller)
                        example: "HD-L-GRAY-001"
            examples:
              admin_update:
                summary: Admin updating product status
                value:
                  status: "APPROVED"
                  isActive: true
              seller_update:
                summary: Seller updating product details
                value:
                  name: "Updated Product Name"
                  description: "Updated product description"
                  price: 99.99
                  discountPrice: 79.99
                  quantity: 50
              full_update_with_variants:
                summary: Admin updates most fields including variants and SKUs
                value:
                  name: "Hoodie 2.0"
                  description: "Premium fleece hoodie with better zipper"
                  isActive: true
                  isFeatured: true
                  status: "APPROVED"
                  categories: ["64b8a8f12a3c1f5d6e9a0001", "64b8a8f12a3c1f5d6e9a0002"]
                  variantGroups:
                    - name: "Size"
                      options:
                        - value: "M"
                        - value: "L"
                        - value: "XL"
                    - name: "Color"
                      options:
                        - value: "BLACK"
                        - value: "GRAY"
                  variantCombinations:
                    - _id: "64c1a7f12a3c1f5d6e9a1001"  # existing combination to update
                      options:
                        - groupName: "Size"
                          optionValue: "L"
                        - groupName: "Color"
                          optionValue: "BLACK"
                      quantity: 20
                      price: 42.5
                      discountPrice: 39.9
                      image: "https://cdn.example.com/hoodie2/L-BLACK.png"
                      sku: "HD-L-BLACK-001"
                    - _id: "64c1a7f12a3c1f5d6e9a1002"  # existing combination to update
                      options:
                        - groupName: "Size"
                          optionValue: "M"
                        - groupName: "Color"
                          optionValue: "GRAY"
                      quantity: 15
                      price: 40
                      discountPrice: 0
                      image: "https://cdn.example.com/hoodie2/M-GRAY.png"
                      sku: "HD-M-GRAY-002"
                    - options:  # new combination without _id (will be created)
                        - groupName: "Size"
                          optionValue: "XL"
                        - groupName: "Color"
                          optionValue: "GRAY"
                      quantity: 10
                      price: 45
                      discountPrice: 41
                      image: "https://cdn.example.com/hoodie2/XL-GRAY.png"
                      sku: "HD-XL-GRAY-003"
              partial_update_some_fields:
                summary: Seller updates a few simple fields (no variants touched)
                value:
                  name: "Basic Tee - New Title"
                  description: "Short description updated"
                  isFeatured: false
                  isActive: true
              variants_add_and_update:
                summary: Seller updates quantities and prices for existing variants and adds one new
                value:
                  variantCombinations:
                    - _id: "64c1a7f12a3c1f5d6e9a2001"
                      options:
                        - groupName: "Size"
                          optionValue: "M"
                        - groupName: "Color"
                          optionValue: "RED"
                      quantity: 12
                      price: 19.9
                      discountPrice: 17.9
                      image: "https://cdn.example.com/tee/M-RED.png"
                      sku: "TEE-M-RED-001"
                    - _id: "64c1a7f12a3c1f5d6e9a2002"
                      options:
                        - groupName: "Size"
                          optionValue: "L"
                        - groupName: "Color"
                          optionValue: "RED"
                      quantity: 8
                      price: 21.9
                      discountPrice: 0
                      image: "https://cdn.example.com/tee/L-RED.png"
                      sku: "TEE-L-RED-002"
                    - options:  # add a new variant
                        - groupName: "Size"
                          optionValue: "XL"
                        - groupName: "Color"
                          optionValue: "RED"
                      quantity: 5
                      price: 22.9
                      discountPrice: 20.9
                      image: "https://cdn.example.com/tee/XL-RED.png"
                      sku: "TEE-XL-RED-003"
              admin_reject_with_reason:
                summary: Admin rejects product with a reason
                value:
                  status: "REJECTED"
                  rejectedReason: "Insufficient specification details provided"
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Product'
                  message:
                    type: string
                    example: "Product updated successfully"
              example:
                success: true
                data:
                  _id: "507f1f77bcf86cd799439011"
                  name: "Updated Product Name"
                  description: "Updated product description"
                  price: 99.99
                  discountPrice: 79.99
                  status: "PENDING"
                  isActive: true
                  isFeatured: false
                  quantity: 50
                  createdBy: "507f1f77bcf86cd799439013"
                  createdAt: "2024-01-01T00:00:00.000Z"
                  updatedAt: "2024-01-01T00:00:00.000Z"
                message: "Product updated successfully"
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                validation_error:
                  summary: Validation error
                  value:
                    success: false
                    error: "Product name must be 2-100 characters, Price cannot be negative"
                    statusCode: 400
                no_fields:
                  summary: No fields provided
                  value:
                    success: false
                    error: "No fields provided for update"
                    statusCode: 400
                rejected_no_reason:
                  summary: Rejected status without reason
                  value:
                    success: false
                    error: "Rejected reason is required when status is REJECTED"
                    statusCode: 400
        '401':
          description: Unauthorized - invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: "Unauthorized access"
                statusCode: 401
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_owner:
                  summary: Seller trying to update another seller's product
                  value:
                    success: false
                    error: "You can only update your own products"
                    statusCode: 403
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: "Product not found"
                statusCode: 404
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                error: "Internal server error"
                statusCode: 500

components:
  schemas:
    Product:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          example: "Product Name"
        description:
          type: string
          example: "Product description"
        price:
          type: number
          example: 99.99
        discountPrice:
          type: number
          example: 79.99
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          example: "PENDING"
        rejectedReason:
          type: string
          nullable: true
          example: "Product description violates community guidelines"
        isActive:
          type: boolean
          example: true
        isFeatured:
          type: boolean
          example: false
        quantity:
          type: number
          example: 50
        createdBy:
          type: string
          example: "507f1f77bcf86cd799439013"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00.000Z"
      required:
        - _id
        - name
        - description
        - price
        - status
        - isActive
        - isFeatured
        - quantity
        - createdBy
        - createdAt
        - updatedAt
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Error message"
        statusCode:
          type: integer
          example: 400
      required:
        - success
        - error
        - statusCode
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT 