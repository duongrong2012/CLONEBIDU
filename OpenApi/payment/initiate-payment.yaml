paths:
  /payments/orders/{orderId}/initiate:
    post:
      summary: Initiate payment for an order
      tags:
        - Payment
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: Order identifier
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: number
                    example: 200
                  message:
                    type: string
                    example: Payment initiated successfully
                  payload:
                    type: object
                    properties:
                      orderId:
                        type: string
                        description: The order id used for subsequent status checks
                      paymentUrl:
                        type: string
                        description: URL to redirect user for payment
                      qrData:
                        type: string
                        description: QR payload (if any)
                      providerOrderCode:
                        type: string
                        description: Transfer content generated for the order
                      providerPayload:
                        type: object
                        additionalProperties:
                          type: string
                        description: Raw payload sent to SePay QR endpoint (acc, bank, des, amount, ...)
                      paymentMethod:
                        type: string
                        example: ONLINE
                      paymentProvider:
                        type: string
                        example: SEPAY
              examples:
                success:
                  value:
                    status: success
                    code: 200
                    message: Payment initiated successfully
                    payload:
                      orderId: "66b1234abcd9012345678901"
                      paymentUrl: "https://qr.sepay.vn/img?bank=MB&acc=0903252427&amount=210000&des=DH66b1234abcd9012345678901"
                      qrData: "https://qr.sepay.vn/img?bank=MB&acc=0903252427&amount=210000&des=DH66b1234abcd9012345678901"
                      providerOrderCode: "DH66b1234abcd9012345678901"
                      providerPayload:
                        acc: "0903252427"
                        bank: "MB"
                        amount: "210000"
                        des: "DH66b1234abcd9012345678901"
                        template: "compact"
                        account_name: "NGO DUC MINH TRI"
                      paymentMethod: "ONLINE"
                      paymentProvider: "SEPAY"
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Order not found
        '500':
          description: Internal server error
