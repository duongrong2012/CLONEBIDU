paths:
  /payments/orders/{orderId}/status:
    get:
      summary: Get order payment status
      tags:
        - Payment
      security:
        - BearerAuth: []
      description: "Buyers can only access their own orders. Admin/Super Admin can access any order."
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: Order identifier
      responses:
        '200':
          description: Payment status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  code:
                    type: number
                    example: 200
                  message:
                    type: string
                    example: Order payment status retrieved successfully
                  payload:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [PENDING, PAID, FAILED, CANCELLED, EXPIRED]
                      paymentProvider:
                        type: string
                        example: SEPAY
                      paymentReference:
                        type: string
                        example: "237654"
                      paidAt:
                        type: string
                        format: date-time
              examples:
                success:
                  value:
                    status: success
                    code: 200
                    message: Order payment status retrieved successfully
                    payload:
                      status: "PAID"
                      paymentProvider: "SEPAY"
                      paymentReference: "237654"
                      paidAt: "2025-10-22T14:47:16.000Z"
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Order not found
        '500':
          description: Internal server error


